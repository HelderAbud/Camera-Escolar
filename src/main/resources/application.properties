spring.application.name=facelogai-backend

# Porta padrão
server.port=8080

# Datasource - assumindo MySQL local (ajuste se necessário)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/facelogai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:facelogai}
spring.datasource.password=${DB_PASSWORD:facelogai}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret-base64=${JWT_SECRET_BASE64:}

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

