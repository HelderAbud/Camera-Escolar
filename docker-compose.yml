services:
  db:
    image: mysql:8.0
    container_name: facelogai_db
    environment:
      MYSQL_DATABASE: facelogai
      MYSQL_USER: facelogai
      MYSQL_PASSWORD: facelogai
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - facelogai_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

volumes:
  facelogai_data:

